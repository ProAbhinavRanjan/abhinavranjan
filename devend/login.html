<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE ACCESS | AR. Backend</title>
    <link rel="stylesheet" href="../frontend/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .login-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .security-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .lock-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tracking-info {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .verification-box {
            background: rgba(99, 102, 241, 0.05);
            border: 1px dashed var(--primary);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
        }

        .captcha-text {
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 5px;
            user-select: none;
        }

        #loginStatus {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 1rem;
            font-family: 'Fira Code', monospace;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="security-header">
            <i class="fas fa-shield-alt lock-icon"></i>
            <h2>Developer Auth</h2>
        </div>

        <div class="tracking-info" id="trackingIP">
            TERMINAL TRACKING: FETCHING ORIGIN...
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Developer ID</label>
                <input type="text" id="userId" placeholder="Enter ID" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Security Key</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="verification-box">
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem;">HUMAN VERIFICATION</p>
                <div class="captcha-text" id="captchaDisplay">0000</div>
                <input type="text" id="captchaInput" placeholder="Enter Code"
                    style="width: 100%; margin-top: 1rem; padding: 0.5rem; text-align: center; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 6px;">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                GRANT ACCESS
            </button>
        </form>

        <div id="loginStatus"></div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Portal</a>
    </div>

    <script>
        // Real-time IP Tracking Simulation
        async function trackIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('trackingIP').innerText = `TRACKING ORIGIN: ${data.ip}`;
            } catch (e) {
                document.getElementById('trackingIP').innerText = `TRACKING ORIGIN: 127.0.0.1 (Local Node)`;
            }
        }

        // Simple Human Verification
        let currentCaptcha = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('captchaDisplay').innerText = currentCaptcha;

        // Form Logic
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const uid = document.getElementById('userId').value;
            const pass = document.getElementById('password').value;
            const captcha = document.getElementById('captchaInput').value;
            const status = document.getElementById('loginStatus');

            if (captcha != currentCaptcha) {
                status.innerText = '❌ Verification Failed. Retry Code.';
                status.style.color = '#f43f5e';
                return;
            }

            // Externalized check pulling from private/keys/login.js
            if (uid === DEV_CREDENTIALS.uid && pass === DEV_CREDENTIALS.pass) {
                status.innerText = '✅ Authentication Successful. Handshaking...';
                status.style.color = '#10b981';
                setTimeout(() => {
                    window.location.href = '../frontend/data/config.json';
                }, 1500);
            } else {
                status.innerText = '❌ Access Denied. Logs Recorded.';
                status.style.color = '#f43f5e';
            }
        });

        window.onload = trackIP;
    </script>
</body>

</html>
