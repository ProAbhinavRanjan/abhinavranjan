<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTS — Live Telecast Server | Abhinav Ranjan</title>
    <meta name="description" content="Join live podcast sessions by Abhinav Ranjan on the Live Telecast Server.">
    <link rel="icon" type="image/png" href="../../images/arlogo.png">
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --lts-primary: #6366f1;
            --lts-accent: #8b5cf6;
            --lts-live: #ef4444;
            --lts-upcoming: #f59e0b;
            --lts-ended: #6b7280;
            --lts-card: rgba(18, 18, 30, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #05050f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 50% 0%, rgba(99, 102, 241, .25) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 90% 80%, rgba(139, 92, 246, .2) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* Nav */
        .lts-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 15, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: .9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lts-nav .lts-logo {
            display: flex;
            align-items: center;
            gap: .6rem;
            text-decoration: none;
            color: #fff;
        }

        .lts-logo-badge {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: .3rem .8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .lts-logo-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, .6);
            font-weight: 400;
        }

        .lts-nav-back {
            text-decoration: none;
            color: rgba(255, 255, 255, .5);
            font-size: .9rem;
            transition: color .2s;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .lts-nav-back:hover {
            color: #fff;
        }

        /* Hero */
        .lts-hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 4rem 2rem 2.5rem;
        }

        .lts-hero h1 {
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 700;
            margin-bottom: .8rem;
            background: linear-gradient(135deg, #fff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lts-hero p {
            color: rgba(255, 255, 255, .5);
            font-size: 1.1rem;
            max-width: 540px;
            margin: 0 auto;
        }

        .lts-live-dot {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .4);
            color: #f87171;
            border-radius: 50px;
            padding: .3rem .9rem;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .lts-live-dot::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: ltsPulse 1.2s ease-in-out infinite;
        }

        @keyframes ltsPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .4;
                transform: scale(1.4)
            }
        }

        /* Podcast Grid */
        .lts-main {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 1rem 2rem 5rem;
        }

        .lts-section-label {
            font-size: .8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .3);
            margin: 2rem 0 1rem;
        }

        .lts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }

        /* Podcast Card */
        .lts-card {
            background: var(--lts-card);
            border: 1px solid rgba(255, 255, 255, .07);
            border-radius: 16px;
            overflow: hidden;
            transition: border-color .25s, transform .25s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .lts-card:hover {
            border-color: rgba(99, 102, 241, .5);
            transform: translateY(-3px);
        }

        .lts-card-thumb {
            height: 140px;
            background: linear-gradient(135deg, #1e1b4b, #312e81, #4c1d95);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lts-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
        }

        .lts-card-thumb-icon {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, .3);
            z-index: 1;
        }

        .lts-status-badge {
            position: absolute;
            top: .8rem;
            right: .8rem;
            z-index: 2;
            font-size: .75rem;
            font-weight: 700;
            padding: .25rem .7rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .lts-status-badge.live {
            background: rgba(239, 68, 68, .2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, .4);
            animation: ltsPulse 1.5s ease-in-out infinite;
        }

        .lts-status-badge.upcoming {
            background: rgba(245, 158, 11, .15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, .35);
        }

        .lts-status-badge.ended {
            background: rgba(107, 114, 128, .15);
            color: #9ca3af;
            border: 1px solid rgba(107, 114, 128, .3);
        }

        .lts-lock-icon {
            position: absolute;
            top: .8rem;
            left: .8rem;
            z-index: 2;
            background: rgba(0, 0, 0, .5);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            color: #fbbf24;
        }

        .lts-card-body {
            padding: 1.1rem 1.2rem 1.3rem;
        }

        .lts-card-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: .3rem;
        }

        .lts-card-host {
            font-size: .85rem;
            color: rgba(255, 255, 255, .45);
            margin-bottom: .7rem;
            display: flex;
            align-items: center;
            gap: .35rem;
        }

        .lts-card-desc {
            font-size: .88rem;
            color: rgba(255, 255, 255, .5);
            line-height: 1.5;
            margin-bottom: .9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .lts-card-meta {
            display: flex;
            gap: .8rem;
            flex-wrap: wrap;
            font-size: .78rem;
            color: rgba(255, 255, 255, .35);
        }

        .lts-card-meta span {
            display: flex;
            align-items: center;
            gap: .3rem;
        }

        .lts-card-join-btn {
            display: block;
            margin-top: 1rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: .7rem 1.2rem;
            font-size: .9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            text-align: center;
            text-decoration: none;
            transition: opacity .2s, transform .2s;
        }

        .lts-card-join-btn:hover {
            opacity: .9;
            transform: translateY(-1px);
        }

        .lts-card-join-btn.ended-btn {
            background: rgba(107, 114, 128, .2);
            color: #6b7280;
            border: 1px solid rgba(107, 114, 128, .3);
            cursor: default;
        }

        .lts-empty {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, .3);
            font-size: 1rem;
        }

        /* Footer */
        .lts-footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 1.5rem;
            color: rgba(255, 255, 255, .2);
            font-size: .85rem;
            border-top: 1px solid rgba(255, 255, 255, .05);
        }

        @media (max-width: 600px) {
            .lts-hero {
                padding: 2.5rem 1.2rem 1.5rem;
            }

            .lts-main {
                padding: 1rem 1.2rem 4rem;
            }

            .lts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="lts-nav">
        <a href="lts-index.html" class="lts-logo">
            <span class="lts-logo-badge">LTS</span>
            <span class="lts-logo-text">Live Telecast Server</span>
        </a>
        <a href="../../index.html" class="lts-nav-back">
            <i class="fas fa-arrow-left"></i> Main Site
        </a>
    </nav>

    <div class="lts-hero">
        <div class="lts-live-dot">Live Podcast Platform</div>
        <h1>Live Telecast Server</h1>
        <p>Join live podcast sessions, Q&A rooms, and exclusive discussions hosted by Abhinav Ranjan.</p>
    </div>

    <main class="lts-main">
        <div id="lts-live-section">
            <div class="lts-section-label">🔴 Live Now</div>
            <div class="lts-grid" id="lts-live-grid"></div>
        </div>
        <div id="lts-upcoming-section">
            <div class="lts-section-label">🕒 Upcoming</div>
            <div class="lts-grid" id="lts-upcoming-grid"></div>
        </div>
        <div id="lts-ended-section">
            <div class="lts-section-label">📁 Past Sessions</div>
            <div class="lts-grid" id="lts-ended-grid"></div>
        </div>
    </main>

    <footer class="lts-footer">
        © 2026 Live Telecast Server · Abhinav Ranjan · LTS Platform
    </footer>

    <script src="lts-podcasts.js"></script>
    <script>
        function buildCard(podcast) {
            const isEnded = podcast.status === 'ended';
            const isLive = podcast.status === 'live';
            const isPrivate = podcast.type === 'private';

            const thumbHTML = podcast.thumbnail
                ? `<img src="${podcast.thumbnail}" alt="${podcast.title}">`
                : `<i class="fas fa-microphone lts-card-thumb-icon"></i>`;

            const lockHTML = isPrivate ? `<div class="lts-lock-icon"><i class="fas fa-lock"></i></div>` : '';

            const statusLabel = { live: '🔴 Live', upcoming: '⏰ Upcoming', ended: 'Ended' }[podcast.status] || '';
            const btnHTML = isEnded
                ? `<span class="lts-card-join-btn ended-btn">Session Ended</span>`
                : `<a href="lts-join.html?id=${encodeURIComponent(podcast.id)}" class="lts-card-join-btn">
                        ${isLive ? '<i class="fas fa-video"></i> Join Now' : '<i class="fas fa-calendar-check"></i> Register'}
                   </a>`;

            return `
                <div class="lts-card">
                    <div class="lts-card-thumb">
                        ${thumbHTML}
                        ${lockHTML}
                        <span class="lts-status-badge ${podcast.status}">${statusLabel}</span>
                    </div>
                    <div class="lts-card-body">
                        <div class="lts-card-title">${podcast.title}</div>
                        <div class="lts-card-host"><i class="fas fa-user-circle"></i> ${podcast.host}</div>
                        <div class="lts-card-desc">${podcast.description}</div>
                        <div class="lts-card-meta">
                            <span><i class="fas fa-calendar"></i> ${podcast.date}</span>
                            <span><i class="fas fa-clock"></i> ${podcast.time}</span>
                            ${isPrivate ? `<span><i class="fas fa-lock" style="color:#fbbf24"></i> Private</span>` : `<span><i class="fas fa-globe"></i> Public</span>`}
                        </div>
                        ${btnHTML}
                    </div>
                </div>
            `;
        }

        function render() {
            const live = (window.LTS_PODCASTS || []).filter(p => p.status === 'live');
            const upcoming = (window.LTS_PODCASTS || []).filter(p => p.status === 'upcoming');
            const ended = (window.LTS_PODCASTS || []).filter(p => p.status === 'ended');

            const liveGrid = document.getElementById('lts-live-grid');
            const upcomingGrid = document.getElementById('lts-upcoming-grid');
            const endedGrid = document.getElementById('lts-ended-grid');

            liveGrid.innerHTML = live.length ? live.map(buildCard).join('') : '<div class="lts-empty">No live sessions right now.</div>';
            upcomingGrid.innerHTML = upcoming.length ? upcoming.map(buildCard).join('') : '<div class="lts-empty">No upcoming sessions scheduled.</div>';
            endedGrid.innerHTML = ended.length ? ended.map(buildCard).join('') : '';

            document.getElementById('lts-ended-section').style.display = ended.length ? '' : 'none';
        }

        render();
    </script>
</body>

</html>
