<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offline — AR.</title>
  <meta name="theme-color" content="#6366f1">
  <link rel="stylesheet" href="frontend/css/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #050505;
      font-family: 'Outfit', sans-serif;
      color: #fff;
    }

    .offline-card {
      background: rgba(20, 20, 30, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 3rem 2rem;
      border-radius: 24px;
      text-align: center;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 102, 241, 0.1);
      animation: fadeIn 0.8s ease-out;
    }

    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.5));
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #a1a1aa;
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="offline-card">
    <div class="offline-icon"><i class="fas fa-wifi-slash"></i></div>
    <h1>Connection Lost</h1>
    <p>It seems you're offline. Don't worry, you can still browse previously visited pages of the portfolio.</p>
    <a href="index.html" class="btn btn-primary" style="text-decoration: none;">Try Reconnecting</a>
  </div>
</body>

</html>
